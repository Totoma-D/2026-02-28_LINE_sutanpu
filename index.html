<!DOCTYPE html>
<html lang="ja">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEスタンプメーカー</title>
    <!-- Content Security Policy: XSS対策 -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' blob: data:;">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<body>
    <header class="app-header">
        <h1>💬 LINE スタンプメーカー</h1>
        <div class="header-actions" style="display: flex; gap: 8px;">
            <button id="btn-guide" class="btn btn-primary" title="使い方ガイドと売れるコツ">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg> ガイド
            </button>
            <button id="btn-undo" class="btn btn-secondary" disabled title="元に戻す (Ctrl+Z)">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M3 7v6h6" />
                    <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />
                </svg> Undo
            </button>
        </div>
    </header>

    <main class="app-container">
        <!-- 左サイド：設定パネル -->
        <aside class="left-sidebar card">

            <!-- コントロールパネル -->
            <div class="controls-panel">

                <!-- 透過処理 -->
                <div class="control-group transparency-controls">
                    <h3>🎨 背景透過処理</h3>
                    <div class="control-row">
                        <button id="btn-picker" class="btn btn-icon" title="プレビュー上の色をスポイトで取得">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <path d="M12 2l3 3-8 8-3 5 5-3 8-8 3 3-5 5 5-3z" />
                            </svg>
                        </button>
                        <div class="color-preview" id="picked-color" style="background-color: transparent;"></div>

                        <div class="slider-group">
                            <label for="tolerance-slider">許容値 <span id="tolerance-val" class="mono">30</span></label>
                            <button class="btn-icon btn-small btn-fine-tune" data-target="tolerance-slider"
                                data-step="-1">◀</button>
                            <input type="range" id="tolerance-slider" min="0" max="100" value="30">
                            <button class="btn-icon btn-small btn-fine-tune" data-target="tolerance-slider"
                                data-step="1">▶</button>
                        </div>

                        <button id="btn-apply-transparency" class="btn btn-primary btn-small">透過実行</button>
                    </div>

                    <div style="margin-bottom: 8px;">
                        <label style="cursor: pointer;">
                            <input type="checkbox" id="contiguous-toggle" checked>
                            <span class="label-text">繋がっている箇所のみ透過する</span>
                        </label>
                    </div>

                    <div class="control-row mode-switch" style="margin-bottom: 8px;">
                        <label class="radio-label">
                            <input type="radio" name="brush-mode" value="none" checked>
                            <span>ブラシOFF</span>
                        </label>
                        <label class="radio-label" title="ドラッグした範囲を透明にします" style="color: var(--color-danger);">
                            <input type="radio" name="brush-mode" value="eraser">
                            <span>消しゴム</span>
                        </label>
                        <label class="radio-label" title="ドラッグした範囲を元の状態に戻します" style="color: var(--color-primary);">
                            <input type="radio" name="brush-mode" value="restore">
                            <span>復元ブラシ</span>
                        </label>
                    </div>

                    <div id="brush-settings" class="control-row" style="display: none; margin-bottom: 8px;">
                        <label for="brush-size-slider" class="label-text" style="width: auto;">ブラシ <span
                                id="brush-size-val" class="mono">20</span></label>
                        <button class="btn-icon btn-small btn-fine-tune" data-target="brush-size-slider"
                            data-step="-1">◀</button>
                        <input type="range" id="brush-size-slider" min="1" max="100" value="20" style="width: 100px;">
                        <button class="btn-icon btn-small btn-fine-tune" data-target="brush-size-slider"
                            data-step="1">▶</button>
                    </div>

                    <div class="control-row bg-toggles">
                        <span class="label-text">確認用背景:</span>
                        <button class="bg-btn active" data-bg="checkerboard" title="市松模様（デフォルト）"></button>
                        <button class="bg-btn" data-bg="green" style="background-color: #00FF00;"
                            title="グリーン（クロマキー）"></button>
                        <button class="bg-btn" data-bg="blue" style="background-color: #0000FF;"
                            title="ブルー（クロマキー）"></button>
                        <button class="bg-btn" data-bg="white" style="background-color: #FFFFFF;" title="ホワイト"></button>
                        <button class="bg-btn" data-bg="black" style="background-color: #000000;" title="ブラック"></button>
                    </div>
                </div>

                <!-- 切り抜き設定 -->
                <div class="control-group crop-controls">
                    <h3>✂️ 切り抜き設定</h3>

                    <div class="control-row mode-switch">
                        <label class="radio-label">
                            <input type="radio" name="crop-mode" value="grid" checked>
                            <span>グリッド分割</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="crop-mode" value="free">
                            <span>自由選択</span>
                        </label>
                    </div>

                    <!-- グリッド設定パネル -->
                    <div id="grid-settings" class="settings-panel">
                        <div class="slider-group">
                            <label for="grid-cols">横分割数 <span id="cols-val" class="mono">3</span></label>
                            <button class="btn-icon btn-small btn-fine-tune" data-target="grid-cols"
                                data-step="-1">◀</button>
                            <input type="range" id="grid-cols" min="1" max="10" value="3">
                            <button class="btn-icon btn-small btn-fine-tune" data-target="grid-cols"
                                data-step="1">▶</button>
                        </div>
                        <div class="slider-group mt-2">
                            <label for="grid-rows">縦分割数 <span id="rows-val" class="mono">3</span></label>
                            <button class="btn-icon btn-small btn-fine-tune" data-target="grid-rows"
                                data-step="-1">◀</button>
                            <input type="range" id="grid-rows" min="1" max="10" value="3">
                            <button class="btn-icon btn-small btn-fine-tune" data-target="grid-rows"
                                data-step="1">▶</button>
                        </div>
                        <div class="slider-group mt-2">
                            <label for="grid-offset-x">左右の余白 <span id="offset-x-val" class="mono">0</span>%</label>

                                data-step="-1">◀</button>
                            <input type="range" id="grid-offset-x" min="0" max="40" value="0">
                            <button class="btn-icon btn-small btn-fine-tune" data-target="grid-offset-x"
                                data-step="1">▶</button>
                        </div>
                        <div class="slider-group mt-2">
                            <label for="grid-offset-y">上下の余白 <span id="offset-y-val" class="mono">0</span>%</label>
                            <button class="btn-icon btn-small btn-fine-tune" data-target="grid-offset-y"
                                data-step="-1">◀</button>
                            <input type="range" id="grid-offset-y" min="0" max="40" value="0">
                            <button class="btn-icon btn-small btn-fine-tune" data-target="grid-offset-y"
                                data-step="1">▶</button>

                    </div>

                    </div>

    <script type="text/markdown" id="guide-markdown">
# 💬 LINEスタンプメーカーの使い方ガイド
中学生でもかんたん！自分だけのオリジナルスタンプを作ろう🎨

このツールは、ブラウザだけでサクサク動いて、画像をLINEスタンプの「専用サイズ（370x320）」に自動で揃えてくれる便利アイテムです！さっそく使い方を見ていきましょう✨

---

## 🛠️ スタンプ作りの4ステップ！

### ステップ1：画像を読み込もう！ 🖼️
- 画面左上の**「＋ボタン」**を押すか、画像ファイルを**直接画面の中央にポイッ（ドラッグ＆ドロップ）**と入れてみよう。
- 複数の画像を読み込んで、上の「タブ」で切り替えながら作業することもできるよ。
- 💡 **New!** マウスのホイールや、スマホ画面のようにつまむ動作（トラックパッドなど）で、画像を自由に**拡大・縮小**できます。さらに右クリックや中クリックしたままドラッグすると、画像を**スイスイ移動**できるよ！

### ステップ2：いらない背景を透明にしよう！ 🪄（背景透過処理）
- コントロールパネルの **「スポイトのアイコン」** をクリックしてね。
- 画像の中で「透明にしたい色（いらない背景）」をクリック！
- その後、**「透過実行」**ボタンを押せば、選んだ色がパッと消えます。
- **👉 ここがポイント：**
  - もし消えすぎる場合は、「許容値」のスライダーを左（小さく）に。全然消えない場合は右（大きく）に調整しよう。
  - **「繋がっている箇所のみ透過する」**のチェックを**外す**と、遠く離れた場所にある同じ色（例えば文字の隙間とか）も一気に全部きれいに消すことができるよ！神機能！
  - **間違えちゃっても安心！**画面右上の「Undo（元に戻す）」ボタンで、1つ前の状態に戻せます！

### ステップ3：画像をスタンプごとに切り抜こう！ ✂️
- **【グリッド分割】モード**
  - アプリで「4コマ漫画」みたいな感じで画像が横長・縦長に並んでいるときに便利！
  - 横と縦に何等分するかスライダーで決めて、**「一括切り抜き」**ボタンを押すだけ。
- **【自由選択】モード**
  - 自分で「ここからここまで！」とマウスをドラッグして、好きな場所を四角く囲んで切り抜くモードだよ。
- **👉 ここがポイント：**
  - 「10px余白(推奨)」にチェックを入れておくと、LINEの公式ルールに合わせて、自動で最高のサイズと余白を整えてくれるからめちゃくちゃ安心！

### ステップ4：完成したスタンプをパソコンに保存！ 📦
- 切り抜いた画像は、右側の「スタンプリスト」にどんどん溜まっていくよ。（最大40個までOK！）
- 最後に右下の「エクスポート設定」から、**代表画像（メイン画像）**と**ストアのタブ画像**を選んでね。（リストから自動で選ぶこともできるよ）
- **「ZIPファイルとして保存」**を押せば、もうこれでLINEにそのまま提出できるパーフェクトなファイルの出来上がり！🎉✨

---

# ✨ 爆売れLINEスタンプに共通する20のポイント
プロもやっている、みんなに使われやすいスタンプの法則をズラッと20個大公開！

1. **毎日使える挨拶が豊富**（おはよう、おやすみ、お疲れ様 など）
2. **文字が大きくて読みやすい**（小さいスマホ画面でもパッと見でわかる）
3. **表情が豊かで感情が伝わる**（喜怒哀楽がハッキリしている）
4. **煽り（あおり）やシュールなネタが面白い**（友達同士でふざけ合える）
5. **返事を濁すときに使える**（「う〜ん」「へぇ〜」などの便利スタンプ）
6. **相槌（あいづち）が打ちやすい**（「それな」「わかる」「草」など）
7. **キャラクターのデザインがシンプル**（ゴチャゴチャしていない）
8. **シリーズ化されていてファンがいる**（第2弾、第3弾が欲しくなる）
9. **ターゲット層が明確**（カップル向け、サラリーマン向け、オタク向けなど）
10. **白くて丸いキャラクター**（ウサギやクマなど、男女問わず好感度が高い）
11. **季節やイベントを問わずに使える**（1年中使えるデザイン）
12. **流行りの言葉をうまく取り入れている**（ただし古くなるのも早いから注意！）
13. **文字なしで「動き」だけで伝わる**（ドヤ顔、土下座、震えるなど）
14. **セリフと絵のギャップが面白い**（可愛いキャラが毒を吐くなど）
15. **謝罪スタンプのバリエーションが豊富**（「ごめん！」「許して〜」は超使う）
16. **仕事や学校の連絡でカドが立たない**（「了解です」「ありがとうございます」の丁寧語）
17. **色がパキッとしていて背景に埋もれない**（LINEのトーク背景で見やすいように白いフチ取りがある）
18. **メイン画像（看板）が一番魅力的**（ストアで見かけた瞬間に欲しくなる）
19. **スタンプの並び順が使いやすい順番になっている**（上の方に挨拶系をまとめる）
20. **クリエイター自身の好き・個性が詰まっている！**（真似だけじゃない、愛着！）
